name = "cloudflare-light-blog"
main = "src/worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
# 静态资源配置
# ============================================
[assets]
directory = "./public"
binding = "ASSETS"
serve_directly = false

# ============================================
# D1 数据库绑定
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "d2c7b655-6eff-4c8f-9c50-fe6850ead27b"
#database_id = "${DB_ID}"


# CORS 配置已迁移至后台网站设置中
# [vars]
# ALLOWED_ORIGIN = "*"

[observability]
enabled = true

[observability.logs]
enabled = true
persist = true
invocation_logs = true
