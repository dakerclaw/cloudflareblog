name = "cloudflare-light-blog"
main = "src/worker.js"
compatibility_date = "2024-05-01"
compatibility_flags = ["nodejs_compat"]

# 环境变量（部署时在 Worker Settings → Variables 中设置）
# ADMIN_PASSWORD = "your-admin-password"

# 日志配置
[observability]
enabled = true

[observability.logs]
enabled = true
persist = true
invocation_logs = true

# ============================================
# 绑定说明：
# 
# 1. D1 数据库绑定：
#    Worker → Settings → Variables → D1 Database Bindings
#    Variable name: DB
#    D1 database: 选择你创建的数据库
#
# 2. R2 存储绑定（可选）：
#    Worker → Settings → Variables → R2 Bucket Bindings
#    Variable name: R2
#    Bucket name: 选择你创建的存储桶
# ============================================